name: Required Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: required-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              # Exempt this workflow file (heredoc would otherwise self-match)
              .github/workflows/_required.yml) continue ;;
              # Exempt any runbook that documents the rule (if present)
              docs/runbooks/no-silent-failures.md) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nE '\|\|[[:space:]]*true([[:space:]]*$|[[:space:]]+#)' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            msg='Found "continue-on-error: true" above. Fix root cause per HomericIntelligence/Odysseus#280.'
            echo "::error::${msg}"
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.11'
      - name: Install dev toolchain (locked)
        run: uv sync --locked --group dev
      - name: yamllint on workflow YAML
        run: uv run yamllint -c .yamllint.yaml .github/workflows/
      - name: Run mypy
        run: |
          if [ -d scripts ] || [ -d tests ]; then
            uv run python -m mypy
          else
            echo "::notice::No scripts/ or tests/ directory — skipping mypy"
          fi
      - name: Run direct PII pattern check
        run: uv run python scripts/check_pii.py

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25  # v20.0.0
        with:
          globs: |
            **/*.md
            !.claude/**
          config: ".markdownlint.yaml"

  # NOTE: The check-run name stays `pixi-check` on purpose (ADR-017 uv migration).
  # It is a REQUIRED status context in the live `homeric-main-extras` ruleset
  # (id 18221133), and the merge-queue readiness contract in
  # configs/github/merge-queue-policy.json + docs/ci/merge-queue.md pins that exact
  # name. Renaming the check-run would deadlock the merge queue until an Odysseus
  # operator (issue #386) re-points the ruleset. So the NAME is held stable while
  # the body is migrated from `pixi install --locked` to `uv sync --locked`.
  # Renaming to `uv-check` is a follow-up that must be coordinated with the ruleset.
  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.11'
      - name: uv sync (locked)
        run: uv sync --locked --group dev
      - name: Verify locked environment runs the test suite
        run: uv run python -m pytest tests/ -q

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.11'
      - name: Install dependencies (locked)
        run: uv sync --locked --group dev
      - name: Run skill-file validation script
        run: uv run python scripts/validate_plugins.py
      - name: Run test suite
        run: uv run pytest tests/ -v

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.11'
      - name: Install dependencies (locked)
        run: uv sync --locked --group dev
      - name: Validate every skill file across the corpus
        run: uv run python scripts/validate_plugins.py
      - name: Assert the skills corpus is non-empty
        run: |
          count=$(find skills -name "*.md" -not -name "*.notes.md" | wc -l)
          echo "Skill files: $count"
          [ "$count" -gt 0 ] || { echo "No skill files found"; exit 1; }

  # Canonical aggregate test gate (ci-naming-convention.md). Surfaces a single
  # `test` check-run that fails if either split suite fails. The split
  # unit-tests / integration-tests sub-checks are KEPT.
  test:
    name: test
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [unit-tests, integration-tests]
    steps:
      - name: Aggregate test result
        run: echo "All test suites (unit-tests, integration-tests) passed."

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.11'
      - name: Run pip-audit against the locked runtime dependencies
        run: |
          # Export the resolved runtime deps from uv.lock (the source of truth
          # after the ADR-017 migration) and audit exactly what ships.
          uv export --frozen --no-dev --no-emit-project --format requirements-txt > audit-requirements.txt
          uvx pip-audit --requirement audit-requirements.txt

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v8.30.1 \
            --repo gitleaks/gitleaks \
            --pattern "gitleaks_8.30.1_linux_x64.tar.gz" \
            --output /tmp/gitleaks.tar.gz
          tar -xz -C /usr/local/bin -f /tmp/gitleaks.tar.gz gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          if [ -f .gitleaks.toml ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --report-format sarif --report-path gitleaks.sarif --exit-code 1
          else
            gitleaks detect --source . \
              --report-format sarif --report-path gitleaks.sarif --exit-code 1
          fi

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 90

  build:
    name: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Count skill files
        run: |
          count=$(find . -name "*.md" -path "*/skills/*" | wc -l)
          echo "Total skill files: $count"
          [ "$count" -gt 0 ] || { echo "No skill files found"; exit 1; }
      - name: Validate all JSON files are parseable
        run: |
          find . -name "*.json" -not -path "*/.git/*" | while read f; do
            jq . "$f" > /dev/null || { echo "Invalid JSON: $f"; exit 1; }
          done
          echo "All JSON files valid"

  # Canonical package gate (ci-naming-convention.md). Mnemosyne's distributable
  # is the Python wheel (mnemosyne_skill_utils), built and smoke-tested here.
  # Athena is the plugin distribution; Mnemosyne is a skills/memory store and no
  # longer ships a plugin-marketplace bundle.
  package:
    name: package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.11'
      - name: Build sdist and wheel
        run: uv build
      - name: twine check
        run: uvx twine check dist/*
      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  install:
    name: install
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: package
    permissions:
      contents: read
    steps:
      # Deliberately NO checkout: the smoke test must import the installed
      # wheel, and an absent repo tree guarantees `mnemosyne_skill_utils` cannot be
      # satisfied from the checkout's scripts/ directory.
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.11'
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Install the wheel into a clean virtualenv
        run: |
          set -euo pipefail
          uv venv "$RUNNER_TEMP/mnemosyne-venv"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/mnemosyne-venv/bin/activate"
          wheel=$(ls dist/*.whl)
          uv pip install --quiet "$wheel"
      - name: Import-smoke the installed package
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/mnemosyne-venv/bin/activate"
          python - <<'PY'
          import inspect
          import mnemosyne_skill_utils
          src = inspect.getsourcefile(mnemosyne_skill_utils)
          assert "site-packages" in src, f"imported from checkout, not wheel: {src}"
          fm, body, errs = mnemosyne_skill_utils.parse_frontmatter("---\nname: smoke\n---\nbody\n")
          assert fm["name"] == "smoke" and not errs, (fm, errs)
          print("OK: installed wheel imports and parses frontmatter:", src)
          PY

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.11'
      - name: Validate workflow YAML files against GitHub schema
        run: |
          # Use the built-in GitHub Actions schema bundled with check-jsonschema
          # to avoid transient 503 failures fetching from json.schemastore.org
          uvx check-jsonschema \
            --builtin-schema vendor.github-workflows \
            .github/workflows/*.yml

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.11'
      - name: Install dependencies (locked)
        run: uv sync --locked --group dev
      - name: Assert every skill declares a valid semver version
        run: uv run python scripts/validate_plugins.py
      - name: Cross-check pyproject version is valid semver
        run: |
          set -euo pipefail
          ver=$(uv run python - <<'PY'
          import tomllib
          print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])
          PY
          )
          echo "pyproject version: $ver"
          printf '%s' "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "::error::pyproject version is not semver: $ver"; exit 1; }

  # Canonical release gate (ci-naming-convention.md). Dry-run validates the
  # release contract (version sync + changelog anchor) on every PR and main
  # push; the actual publish happens in release.yml on v* tags and re-runs
  # the same validator with --tag.
  release:
    name: release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.11'
      - name: Validate release contract (dry-run)
        run: uv run python scripts/validate_release_contract.py
