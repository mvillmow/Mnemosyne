name: Validate Plugins

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: '3.11'

      - name: Install dependencies (locked)
        run: uv sync --locked --group dev

      - name: Lint with ruff
        run: uv run ruff check scripts/ tests/

      - name: Validate flat-format skill files
        run: uv run python scripts/validate_plugins.py

      - name: Type check
        run: uv run mypy scripts/ --ignore-missing-imports

      - name: Run test suite
        run: uv run pytest tests/ -v

      - name: Check skill template validity
        run: |
          echo "Checking template structure..."
          if [ ! -f "templates/skill-template.md" ]; then
            echo "ERROR: Template skill-template.md missing"
            exit 1
          fi
          echo "Template structure valid"
